services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: topic127-mosquitto
    restart: unless-stopped

    ports:
      - "${MQTT_PORT:-1883}:1883"

    volumes:
      - ./config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

    healthcheck:
      test:
        - CMD-SHELL
        - >
          mosquitto_sub
          -h localhost
          -p 1883
          -t '$$SYS/broker/version'
          -C 1
          -W 5
          >/dev/null 2>&1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

    networks:
      - topic127-network

  influxdb:
    image: influxdb:2.7
    container_name: topic127-influxdb
    restart: unless-stopped

    ports:
      - "${INFLUX_PORT:-8086}:8086"

    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_USERNAME:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_PASSWORD:-admin12345}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG:-topic127}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET:-cleanroom}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN:-topic127-token}

    volumes:
      - influxdb-data:/var/lib/influxdb2

    healthcheck:
      test:
        - CMD
        - influx
        - ping
        - --host
        - http://localhost:8086
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

    networks:
      - topic127-network

  grafana:
    image: grafana/grafana:latest
    container_name: topic127-grafana
    restart: unless-stopped

    ports:
      - "3000:3000"

    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin12345}
      GF_USERS_ALLOW_SIGN_UP: "false"

      # These values are passed into the Grafana container so that
      # grafana/provisioning/datasources/influxdb.yml can read them.
      INFLUX_HOST: ${INFLUX_HOST:-influxdb}
      INFLUX_PORT: ${INFLUX_PORT:-8086}
      INFLUX_ORG: ${INFLUX_ORG:-topic127}
      INFLUX_BUCKET: ${INFLUX_BUCKET:-cleanroom}
      INFLUX_TOKEN: ${INFLUX_TOKEN:-topic127-token}

    volumes:
      - grafana-data:/var/lib/grafana

      # New datasource provisioning location.
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

      # Existing dashboard JSON files.
      - ./dashboards/json:/var/lib/grafana/dashboards:ro

    depends_on:
      influxdb:
        condition: service_healthy

    healthcheck:
      test:
        - CMD-SHELL
        - >
          wget --quiet --spider
          http://localhost:3000/api/health
          || exit 1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

    networks:
      - topic127-network

volumes:
  mosquitto-data:
  mosquitto-log:
  influxdb-data:
  grafana-data:

networks:
  topic127-network:
    driver: bridge